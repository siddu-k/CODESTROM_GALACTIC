<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic AI | Command Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #030508;
            color: #f1f5f9;
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 0;
            background: black;
        }

        .lil-gui {
            display: none !important;
        }

        .glass-card {
            background: rgba(8, 12, 28, 0.88);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(148, 163, 184, 0.15);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            background: rgba(12, 18, 40, 0.95);
            border-color: var(--hover-color, rgba(59, 130, 246, 0.4));
            box-shadow: 0 0 50px var(--glow-color, rgba(59, 130, 246, 0.15)), 0 20px 60px rgba(0, 0, 0, 0.6);
            transform: translateY(-6px) scale(1.02);
        }

        .glass-card .card-icon {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover .card-icon {
            transform: scale(1.15);
            box-shadow: 0 0 25px var(--glow-color, rgba(59, 130, 246, 0.3));
        }

        .glass-card .arrow-icon {
            transition: transform 0.3s ease;
        }

        .glass-card:hover .arrow-icon {
            transform: translateX(5px);
        }

        .header-glass {
            background: rgba(5, 10, 20, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .status-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-animate {
            animation: fadeInUp 0.8s ease forwards;
            opacity: 0;
        }
    </style>
</head>

<body>

    <!-- 3D Galaxy Particles -->
    <canvas id="canvas"></canvas>

    <!-- Back Button -->
    <a href="index.html"

        style="--hover-color: rgba(239, 68, 68, 0.25); --glow-color: rgba(239, 68, 68, 0.1);">
        <i data-lucide="log-out" class="w-4 h-4 text-slate-400 group-hover:text-red-400 transition-colors"></i>
        <span class="text-xs font-bold text-slate-400 group-hover:text-red-400 transition-colors">Logout</span>
    </button>

    <!-- Cards Grid — 2x2 around the earth -->
    <div class="fixed inset-0 z-20 pointer-events-none flex items-center justify-center p-8">
        <div
            class="grid grid-cols-[280px_1fr_280px] grid-rows-[auto_1fr_auto] gap-8 w-full max-w-[1100px] h-full max-h-[680px]">

            <!-- Top Left Card — Geospatial Research -->
            <a href="aiarea.html"
                class="glass-card rounded-2xl p-5 block group pointer-events-auto self-start card-animate"
                style="--hover-color: rgba(52, 211, 153, 0.35); --glow-color: rgba(52, 211, 153, 0.12); animation-delay: 0.2s;">
                <div class="flex items-start gap-3">
                    <div
                        class="w-10 h-10 rounded-xl bg-emerald-500/15 flex items-center justify-center border border-emerald-500/20 card-icon shrink-0">
                        <i data-lucide="map" class="w-5 h-5 text-emerald-400"></i>
                    </div>
                    <div>
                        <h2 class="text-sm font-extrabold text-white mb-1 tracking-tight">Geospatial Research</h2>
                        <p class="text-slate-400 text-[10px] leading-relaxed mb-2">AI terrain analysis & mapping.</p>
                        <div
                            class="flex items-center gap-1.5 text-emerald-400 text-[10px] font-bold uppercase tracking-wider">
                            <span>Launch</span>
                            <i data-lucide="arrow-right" class="w-3 h-3 arrow-icon"></i>
                        </div>
                    </div>
                </div>
            </a>

            <!-- Top spacer -->
            <div></div>

            <!-- Top Right Card — Climate Monitor -->
            <a href="climate.html"
                class="glass-card rounded-2xl p-5 block group pointer-events-auto self-start card-animate"
                style="--hover-color: rgba(34, 211, 238, 0.35); --glow-color: rgba(34, 211, 238, 0.12); animation-delay: 0.4s;">
                <div class="flex items-start gap-3">
                    <div
                        class="w-10 h-10 rounded-xl bg-cyan-500/15 flex items-center justify-center border border-cyan-500/20 card-icon shrink-0">
                        <i data-lucide="globe" class="w-5 h-5 text-cyan-400"></i>
                    </div>
                    <div>
                        <h2 class="text-sm font-extrabold text-white mb-1 tracking-tight">Global Climate</h2>
                        <p class="text-slate-400 text-[10px] leading-relaxed mb-2">3D weather & atmospheric data.</p>
                        <div
                            class="flex items-center gap-1.5 text-cyan-400 text-[10px] font-bold uppercase tracking-wider">
                            <span>Launch</span>
                            <i data-lucide="arrow-right" class="w-3 h-3 arrow-icon"></i>
                        </div>
                    </div>
                </div>
            </a>

            <!-- Middle row spacer (earth shows through here) -->
            <div></div>
            <div></div>
            <div></div>

            <!-- Bottom Left Card — Cosmic Research -->
            <a href="research.html"
                class="glass-card rounded-2xl p-5 block group pointer-events-auto self-end card-animate"
                style="--hover-color: rgba(168, 85, 247, 0.35); --glow-color: rgba(168, 85, 247, 0.12); animation-delay: 0.6s;">
                <div class="flex items-start gap-3">
                    <div
                        class="w-10 h-10 rounded-xl bg-purple-500/15 flex items-center justify-center border border-purple-500/20 card-icon shrink-0">
                        <i data-lucide="search" class="w-5 h-5 text-purple-400"></i>
                    </div>
                    <div>
                        <h2 class="text-sm font-extrabold text-white mb-1 tracking-tight">Cosmic Research</h2>
                        <p class="text-slate-400 text-[10px] leading-relaxed mb-2">NASA archives & mission data.</p>
                        <div
                            class="flex items-center gap-1.5 text-purple-400 text-[10px] font-bold uppercase tracking-wider">
                            <span>Launch</span>
                            <i data-lucide="arrow-right" class="w-3 h-3 arrow-icon"></i>
                        </div>
                    </div>
                </div>
            </a>

            <!-- Bottom spacer -->
            <div></div>

            <!-- Bottom Right Card — Solar System -->
            <a href="spaceinfo.html"
                class="glass-card rounded-2xl p-5 block group pointer-events-auto self-end card-animate"
                style="--hover-color: rgba(251, 146, 60, 0.35); --glow-color: rgba(251, 146, 60, 0.12); animation-delay: 0.8s;">
                <div class="flex items-start gap-3">
                    <div
                        class="w-10 h-10 rounded-xl bg-orange-500/15 flex items-center justify-center border border-orange-500/20 card-icon shrink-0">
                        <i data-lucide="sun" class="w-5 h-5 text-orange-400"></i>
                    </div>
                    <div>
                        <h2 class="text-sm font-extrabold text-white mb-1 tracking-tight">Solar System</h2>
                        <p class="text-slate-400 text-[10px] leading-relaxed mb-2">Interactive 3D orbit simulation.</p>
                        <div
                            class="flex items-center gap-1.5 text-orange-400 text-[10px] font-bold uppercase tracking-wider">
                            <span>Launch</span>
                            <i data-lucide="arrow-right" class="w-3 h-3 arrow-icon"></i>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        lucide.createIcons();

        function logoutUser() {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            });
        }
    </script>
    <script type="module">
        import { AdditiveBlending, BufferAttribute, BufferGeometry, CanvasTexture, Color, PerspectiveCamera, Points, RawShaderMaterial, Scene, WebGLRenderer } from "https://cdn.skypack.dev/three@0.136.0"
        import { OrbitControls } from "https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls"
        import { TWEEN } from "https://cdn.skypack.dev/three@0.136.0/examples/jsm/libs/tween.module.min.js"

        const count = 128 ** 2
        const scene = new Scene()
        const camera = new PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100)
        camera.position.set(0, 2, 3)

        const renderer = new WebGLRenderer({ canvas: document.getElementById('canvas') })
        renderer.setSize(innerWidth, innerHeight)
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))

        const orbit = new OrbitControls(camera, renderer.domElement)

        // Star alpha texture
        const ctx = document.createElement("canvas").getContext("2d")
        ctx.canvas.width = ctx.canvas.height = 32
        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 32, 32)
        let grd = ctx.createRadialGradient(16, 16, 0, 16, 16, 16)
        grd.addColorStop(0.0, "#fff"); grd.addColorStop(1.0, "#000")
        ctx.fillStyle = grd
        ctx.beginPath(); ctx.rect(15, 0, 2, 32); ctx.fill()
        ctx.beginPath(); ctx.rect(0, 15, 32, 2); ctx.fill()
        grd = ctx.createRadialGradient(16, 16, 0, 16, 16, 16)
        grd.addColorStop(0.1, "#ffff"); grd.addColorStop(0.6, "#0000")
        ctx.fillStyle = grd; ctx.fillRect(0, 0, 32, 32)
        const alphaMap = new CanvasTexture(ctx.canvas)

        const shaderUtils = `
    float random (vec2 st) {
      return fract(sin(dot(st.xy, vec2(12.9898, 78.233))) * 43758.5453123);
    }
    vec3 scatter (vec3 seed) {
      float u = random(seed.xy); float v = random(seed.yz);
      float theta = u * 6.28318530718; float phi = acos(2.0 * v - 1.0);
      float sinTheta = sin(theta); float cosTheta = cos(theta);
      float sinPhi = sin(phi); float cosPhi = cos(phi);
      return vec3(sinPhi * cosTheta, sinPhi * sinTheta, cosPhi);
    }`

        // Galaxy
        const galaxyGeometry = new BufferGeometry()
        const galaxyPosition = new Float32Array(count * 3)
        const galaxySeed = new Float32Array(count * 3)
        const galaxySize = new Float32Array(count)
        for (let i = 0; i < count; i++) {
            galaxyPosition[i * 3] = i / count
            galaxySeed[i * 3] = Math.random(); galaxySeed[i * 3 + 1] = Math.random(); galaxySeed[i * 3 + 2] = Math.random()
            galaxySize[i] = Math.random() * 2 + 0.5
        }
        galaxyGeometry.setAttribute("position", new BufferAttribute(galaxyPosition, 3))
        galaxyGeometry.setAttribute("size", new BufferAttribute(galaxySize, 1))
        galaxyGeometry.setAttribute("seed", new BufferAttribute(galaxySeed, 3))

        const innColor = new Color("#f40"), outColor = new Color("#a7f")
        const galaxyMaterial = new RawShaderMaterial({
            uniforms: {
                uTime: { value: 0 }, uSize: { value: renderer.getPixelRatio() },
                uBranches: { value: 2 }, uRadius: { value: 0 }, uSpin: { value: Math.PI * 0.25 },
                uRandomness: { value: 0 }, uAlphaMap: { value: alphaMap },
                uColorInn: { value: innColor }, uColorOut: { value: outColor },
            },
            vertexShader: `
        precision highp float;
        attribute vec3 position; attribute float size; attribute vec3 seed;
        uniform mat4 projectionMatrix; uniform mat4 modelViewMatrix;
        uniform float uTime, uSize, uBranches, uRadius, uSpin, uRandomness;
        varying float vDistance;
        #define PI  3.14159265359
        #define PI2 6.28318530718
        #include <random, scatter>
        void main() {
          vec3 p = position; float st = sqrt(p.x); float qt = p.x * p.x; float mt = mix(st, qt, p.x);
          float angle = qt * uSpin * (2.0 - sqrt(1.0 - qt));
          float branchOffset = (PI2 / uBranches) * floor(seed.x * uBranches);
          p.x = position.x * cos(angle + branchOffset) * uRadius;
          p.z = position.x * sin(angle + branchOffset) * uRadius;
          p += scatter(seed) * random(seed.zx) * uRandomness * mt; p.y *= 0.5 + qt * 0.5;
          vec3 temp = p; float ac = cos(-uTime * (2.0 - st) * 0.5); float as = sin(-uTime * (2.0 - st) * 0.5);
          p.x = temp.x * ac - temp.z * as; p.z = temp.x * as + temp.z * ac;
          vDistance = mt;
          vec4 mvp = modelViewMatrix * vec4(p, 1.0);
          gl_Position = projectionMatrix * mvp; gl_PointSize = (10.0 * size * uSize) / -mvp.z;
        }`,
            fragmentShader: `
        precision highp float;
        uniform vec3 uColorInn, uColorOut; uniform sampler2D uAlphaMap; varying float vDistance;
        #define PI 3.14159265359
        void main() {
          vec2 uv = vec2(gl_PointCoord.x, 1.0 - gl_PointCoord.y);
          float a = texture2D(uAlphaMap, uv).g; if (a < 0.1) discard;
          vec3 color = mix(uColorInn, uColorOut, vDistance);
          float c = step(0.99, (sin(gl_PointCoord.x * PI) + sin(gl_PointCoord.y * PI)) * 0.5);
          color = max(color, vec3(c)); gl_FragColor = vec4(color, a);
        }`,
            transparent: true, depthTest: false, depthWrite: false, blending: AdditiveBlending,
        })
        const galaxy = new Points(galaxyGeometry, galaxyMaterial)
        galaxy.material.onBeforeCompile = (shader) => { shader.vertexShader = shader.vertexShader.replace("#include <random, scatter>", shaderUtils) }
        scene.add(galaxy)

        // Universe
        const universeGeometry = new BufferGeometry()
        const universePosition = new Float32Array(count * 3 / 2)
        const universeSeed = new Float32Array(count * 3 / 2)
        const universeSize = new Float32Array(count / 2)
        for (let i = 0; i < count / 2; i++) {
            universeSeed[i * 3] = Math.random(); universeSeed[i * 3 + 1] = Math.random(); universeSeed[i * 3 + 2] = Math.random()
            universeSize[i] = Math.random() * 2 + 0.5
        }
        universeGeometry.setAttribute("position", new BufferAttribute(universePosition, 3))
        universeGeometry.setAttribute("seed", new BufferAttribute(universeSeed, 3))
        universeGeometry.setAttribute("size", new BufferAttribute(universeSize, 1))

        const universeMaterial = new RawShaderMaterial({
            uniforms: {
                uTime: { value: 0 }, uSize: galaxyMaterial.uniforms.uSize,
                uRadius: galaxyMaterial.uniforms.uRadius, uAlphaMap: galaxyMaterial.uniforms.uAlphaMap,
            },
            vertexShader: `
        precision highp float;
        attribute vec3 seed; attribute float size;
        uniform mat4 projectionMatrix; uniform mat4 modelViewMatrix;
        uniform float uTime, uSize, uRadius;
        #define PI  3.14159265359
        #define PI2 6.28318530718
        #include <random, scatter>
        const float r = 3.0; const vec3 s = vec3(2.1, 1.3, 2.1);
        void main() {
          vec3 p = scatter(seed) * r * s;
          float q = random(seed.zx); for (int i = 0; i < 3; i++) q *= q; p *= q;
          float l = length(p) / (s.x * r); p = l < 0.001 ? (p / l) : p;
          vec3 temp = p; float ql = 1.0 - l; for (int i = 0; i < 3; i++) ql *= ql;
          float ac = cos(-uTime * ql); float as = sin(-uTime * ql);
          p.x = temp.x * ac - temp.z * as; p.z = temp.x * as + temp.z * ac;
          vec4 mvp = modelViewMatrix * vec4(p * uRadius, 1.0);
          gl_Position = projectionMatrix * mvp; l = (2.0 - l) * (2.0 - l);
          gl_PointSize = (r * size * uSize * l) / -mvp.z;
        }`,
            fragmentShader: `
        precision highp float;
        uniform sampler2D uAlphaMap;
        void main() {
          vec2 uv = vec2(gl_PointCoord.x, 1.0 - gl_PointCoord.y);
          float a = texture2D(uAlphaMap, uv).g; if (a < 0.1) discard;
          gl_FragColor = vec4(vec3(1.0), a);
        }`,
            transparent: true, depthTest: false, depthWrite: false, blending: AdditiveBlending,
        })
        const universe = new Points(universeGeometry, universeMaterial)
        universe.material.onBeforeCompile = (shader) => { shader.vertexShader = shader.vertexShader.replace("#include <random, scatter>", shaderUtils) }
        scene.add(universe)

        // Intro animation
        const u = galaxyMaterial.uniforms
        new TWEEN.Tween({ radius: 0, spin: 0, randomness: 0, rotate: 0 })
            .to({ radius: 1.618, spin: Math.PI * 2, randomness: 0.5, rotate: Math.PI * 4 })
            .duration(5000).easing(TWEEN.Easing.Cubic.InOut)
            .onUpdate(({ radius, spin, randomness, rotate }) => {
                u.uRadius.value = radius; u.uSpin.value = spin; u.uRandomness.value = randomness;
                galaxy.rotation.y = rotate; universe.rotation.y = rotate / 3;
            }).start()

        // Render loop
        const t = 0.001
        renderer.setAnimationLoop(() => {
            galaxyMaterial.uniforms.uTime.value += t / 2
            universeMaterial.uniforms.uTime.value += t / 3
            TWEEN.update(); orbit.update(); renderer.render(scene, camera)
        })

        addEventListener("resize", () => {
            camera.aspect = innerWidth / innerHeight
            camera.updateProjectionMatrix()
            renderer.setSize(innerWidth, innerHeight)
        })
    </script>
</body>

</html>
